name: Create GitHub Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish. Defaults to package.json version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${REQUESTED_TAG}" ]]; then
            tag="${REQUESTED_TAG}"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
          fi

          git fetch --tags --force origin

          if ! git rev-parse -q --verify "refs/tags/${tag}^{commit}" >/dev/null; then
            echo "Tag ${tag} does not exist; skipping release creation."
            echo "create=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "create=true" >> "${GITHUB_OUTPUT}"

      - name: Create release
        if: steps.release.outputs.create == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists."
            exit 0
          fi

          gh release create "${tag}" --title "${tag}" --generate-notes
